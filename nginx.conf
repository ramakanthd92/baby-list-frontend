server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Content-Type-Options   "nosniff"           always;
    add_header X-Frame-Options          "DENY"              always;
    add_header X-XSS-Protection         "1; mode=block"     always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "geolocation=(), camera=(), microphone=()" always;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/javascript application/javascript
        application/json image/svg+xml;

    # ── API reverse proxy ─────────────────────────────────────────────────────
    # All API calls are proxied to the FastAPI backend container.
    # This avoids CORS issues and means VITE_API_BASE_URL can stay empty.
    location ~ ^/(listings|categories|sources|health)(/.*)?$ {
        proxy_pass         http://api:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;

        # Strip CORS headers from upstream — nginx owns them
        proxy_hide_header  Access-Control-Allow-Origin;
        add_header         Access-Control-Allow-Origin "$http_origin" always;
    }

    # ── Static assets — long-lived cache ─────────────────────────────────────
    location ~* \.(js|css|woff2?|ttf|otf|eot|ico|svg|png|jpg|webp|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Nginx health check endpoint ───────────────────────────────────────────
    location = /health-check {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── SPA fallback — all other routes serve index.html ─────────────────────
    location / {
        try_files $uri $uri/ /index.html;

        # index.html must NOT be cached — browser needs to re-fetch on deploy
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma        "no-cache";
            add_header Expires       "0";
        }
    }
}
